name: Build Flutter APK and AAB

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android wrapper
        run: flutter create --platforms=android --org com.alterly .

      - name: Restore Alterly Android files
        run: |
          git checkout -- android/app/src/main/AndroidManifest.xml
          git checkout -- android/app/src/main/kotlin/com/alterly/app/MainActivity.kt
          git checkout -- android/app/src/main/kotlin/com/alterly/app/AlterlyAlarmService.kt
          git checkout -- android/app/src/main/kotlin/com/alterly/app/AlterlyGeofenceReceiver.kt

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build release APK
        run: flutter build apk --release

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: alterly-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: alterly-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
